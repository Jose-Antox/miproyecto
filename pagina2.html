<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página 2 - José Antonio Miranda</title>
  <style>
    /* --- ESTILOS GENERALES --- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .form-card {
      background: #ffffff;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
      max-width: 480px;
      width: 100%;
    }

    h1 {
      color: #1e293b;
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .author-info {
      color: #64748b;
      font-size: 0.95rem;
      margin-bottom: 30px;
    }

    h2 {
      color: #334155;
      font-size: 1.3rem;
      font-weight: 600;
      margin-bottom: 20px;
      border-bottom: 2px solid #e2e8f0;
      padding-bottom: 8px;
    }

    /* --- ESTILOS DEL FORMULARIO --- */
    form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      color: #475569;
      font-size: 0.9rem;
      font-weight: 600;
    }

    input[type="text"],
    input[type="email"],
    textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 0.95rem;
      color: #334155;
      background-color: #f8fafc;
      transition: all 0.2s ease;
    }

    /* Efecto al hacer clic en los campos */
    input[type="text"]:focus,
    input[type="email"]:focus,
    textarea:focus {
      outline: none;
      border-color: #4f46e5;
      background-color: #ffffff;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }

    input[type="submit"] {
      background-color: #4f46e5;
      color: white;
      border: none;
      padding: 14px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
      box-shadow: 0 4px 6px rgba(79, 70, 229, 0.15);
      margin-top: 10px;
    }

    input[type="submit"]:hover {
      background-color: #4338ca;
    }

    input[type="submit"]:active {
      transform: scale(0.98);
    }

    /* --- NAVEGACIÓN --- */
    .nav-links {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid #e2e8f0;
      display: flex;
      justify-content: space-around;
    }

    .btn-back {
      text-decoration: none;
      color: #64748b;
      font-size: 0.9rem;
      font-weight: 600;
      transition: color 0.2s;
    }

    .btn-back:hover {
      color: #1e293b;
    }
  </style>
</head>

<body>

  <div class="form-card">
    <h1>Página 2</h1>
    <p class="author-info">Contenido editado por José Antonio Miranda Ruiz. grupo: 1m1-sis 😊🎤</p>

    <h2>Formulario de contacto</h2>
    
    <form action="/enviar" method="post">
      <div class="form-group">
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" value="José Antonio Miranda Ruiz" required />
      </div>

      <div class="form-group">
        <label for="correo">Correo electrónico:</label>
        <input type="email" id="correo" name="correo" value="joseantonio@gmail.com" required />
      </div>

      <div class="form-group">
        <label for="mensaje">Mensaje:</label>
        <textarea id="mensaje" name="mensaje" rows="5" placeholder="Mi primera vez trabajando colaborativo" required></textarea>
      </div>

      <input type="submit" value="Enviar" />
    </form>

    <div class="nav-links">
      <a href="index.html" class="btn-back">🏠 Menú Inicio</a>
      <a href="pagina1.html" class="btn-back" style="color: #0ea5e9;">📄 Ir a Página 1</a>
    </div>
  </div>

</body>

</html>
